<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Insight Daily — AI 最新资讯聚合</title>
  <meta name="description" content="AI 最新资讯 / 热点内容聚合展示，基于 Agent 自动化发布">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="nav-logo">🤖</span>
        <span class="nav-title">AI Insight Daily</span>
      </div>
      <div class="nav-actions">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" placeholder="搜索文章...">
        </div>
        <button class="theme-toggle" id="themeToggle" title="切换深色/浅色模式">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container">
    <!-- Hero -->
    <section class="hero">
      <h1 class="hero-title">AI 最新资讯聚合</h1>
      <p class="hero-subtitle">追踪前沿动态 · Agent 自动化发布 · 每日精选</p>
    </section>

    <!-- 统计卡片 -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">文章总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statWeek">0</div>
        <div class="stat-label">本周新增</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statTags">0</div>
        <div class="stat-label">标签数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statLatest">—</div>
        <div class="stat-label">最近更新</div>
      </div>
    </section>

    <!-- 标签筛选 -->
    <section class="filter-bar" id="filterBar">
      <button class="tag-btn active" data-tag="all">全部</button>
    </section>

    <!-- 文章卡片列表 -->
    <section class="card-grid" id="cardGrid">
      <!-- JS 动态渲染 -->
    </section>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📭</div>
      <p>没有找到匹配的文章</p>
    </div>
  </main>

  <!-- 文章详情模态框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-header">
        <div class="modal-tags" id="modalTags"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>AI Insight Daily &copy; 2026 · Powered by Claude Code Agent</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
